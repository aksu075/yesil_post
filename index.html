<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yeşil Özel Güvenlik - İlan Oluşturucu</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat',sans-serif;background:#0e0e12;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px;color:#fff}
h1{font-size:22px;margin-bottom:6px;color:#34d399}
.controls{background:#1a1a24;border-radius:16px;padding:24px;margin-bottom:24px;width:100%;max-width:620px;border:1px solid rgba(52,211,153,0.15)}
.controls h2{font-size:15px;color:#34d399;margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column}
.form-group label{font-size:11px;font-weight:600;color:#8892b0;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select{background:#12121a;border:1px solid rgba(52,211,153,0.2);border-radius:8px;padding:10px 12px;color:#fff;font-size:14px;font-family:'Montserrat',sans-serif;outline:none}
.form-group input:focus,.form-group select:focus{border-color:#34d399}
.form-group select option{background:#12121a}
.btn-download{display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,#34d399,#059669);color:#fff;border:none;border-radius:10px;padding:14px 28px;font-size:15px;font-weight:700;font-family:'Montserrat',sans-serif;cursor:pointer;margin-top:16px;width:100%;transition:transform .2s}
.btn-download:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(52,211,153,.35)}
canvas#preview{max-width:100%;height:auto;border-radius:8px;margin-bottom:16px}
.note{margin-top:12px;font-size:13px;color:#666;text-align:center}
</style>
</head>
<body>

<h1>YG Eğitim İlanı Oluşturucu</h1>
<p style="color:#8892b0;margin-bottom:20px;font-size:14px">Bilgileri düzenle, önizle, PNG olarak indir</p>

<div class="controls">
  <h2>İlan Bilgileri</h2>
  <div class="form-grid">
    <div class="form-group">
      <label>Eğitim Türü</label>
      <select id="egitimTuru" onchange="render()">
        <option value="TEMEL">Temel Eğitim</option>
        <option value="YENİLEME" selected>Yenileme Eğitimi</option>
      </select>
    </div>
    <div class="form-group">
      <label>Sertifika Türü</label>
      <select id="sertifikaTuru" onchange="render()">
        <option value="Silahlı &amp; Silahsız" selected>Silahlı & Silahsız</option>
        <option value="Silahlı">Sadece Silahlı</option>
        <option value="Silahsız">Sadece Silahsız</option>
      </select>
    </div>
    <div class="form-group">
      <label>Son Başvuru</label>
      <input type="text" id="sonBasvuru" value="02 Mart 2026" oninput="render()">
    </div>
    <div class="form-group">
      <label>Kurs Başlangıç</label>
      <input type="text" id="kursBaslangic" value="05 Mart 2026" oninput="render()">
    </div>
    <div class="form-group">
      <label>Sınav Tarihi</label>
      <input type="text" id="sinavTarihi" value="03 Mayıs 2026" oninput="render()">
    </div>
    <div class="form-group">
      <label>Eğitim Süresi</label>
      <input type="text" id="egitimSuresi" value="Silahlı: 7 gün / Silahsız: 6 gün" oninput="render()">
    </div>
  </div>
  <button class="btn-download" onclick="download()">⬇ PNG Olarak İndir (1080×1080)</button>
</div>

<canvas id="preview" width="1080" height="1080"></canvas>

<p class="note">Önizleme yukarıda. Bilgileri değiştirdikçe otomatik güncellenir.</p>

const W = 1080, H = 1080;
const canvas = document.getElementById('preview');
const ctx = canvas.getContext('2d');

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawIcon(type, x, y, size) {
  const s = size;
  ctx.strokeStyle = '#34d399';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  
  if (type === 'calendar') {
    roundRect(ctx, x, y+4, s, s-4, 4);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, y+12); ctx.lineTo(x+s, y+12); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x+8, y); ctx.lineTo(x+8, y+8); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x+s-8, y); ctx.lineTo(x+s-8, y+8); ctx.stroke();
    ctx.fillStyle = '#34d399';
    ctx.beginPath(); ctx.arc(x+s/2, y+s-6, 2.5, 0, Math.PI*2); ctx.fill();
  } else if (type === 'graduation') {
    ctx.beginPath();
    ctx.moveTo(x+s/2, y+2); ctx.lineTo(x, y+10); ctx.lineTo(x+s/2, y+18); ctx.lineTo(x+s, y+10); ctx.closePath(); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x+6, y+14); ctx.lineTo(x+6, y+22);
    ctx.quadraticCurveTo(x+s/2, y+28, x+s-6, y+22);
    ctx.lineTo(x+s-6, y+14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+s-2, y+10); ctx.lineTo(x+s-2, y+22); ctx.stroke();
    ctx.fillStyle = '#34d399';
    ctx.beginPath(); ctx.arc(x+s-2, y+23, 1.8, 0, Math.PI*2); ctx.fill();
  } else if (type === 'exam') {
    roundRect(ctx, x+2, y+1, s-4, s-2, 3);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x+8, y+10); ctx.lineTo(x+s-8, y+10); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x+8, y+16); ctx.lineTo(x+s-12, y+16); ctx.stroke();
    ctx.fillStyle = '#34d399';
    ctx.beginPath(); ctx.arc(x+s-8, y+s-8, 5, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#0f1f14'; ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.moveTo(x+s-11, y+s-8); ctx.lineTo(x+s-9, y+s-6); ctx.lineTo(x+s-5, y+s-10); ctx.stroke();
    ctx.strokeStyle = '#34d399'; ctx.lineWidth = 2;
  } else if (type === 'shield') {
    ctx.beginPath();
    ctx.moveTo(x+s/2, y); ctx.lineTo(x, y+7); ctx.lineTo(x, y+16);
    ctx.quadraticCurveTo(x+s/2, y+s+2, x+s/2, y+s+2);
    ctx.quadraticCurveTo(x+s/2, y+s+2, x+s, y+16);
    ctx.lineTo(x+s, y+7); ctx.closePath(); ctx.stroke();
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(x+s/2-5, y+s/2+2); ctx.lineTo(x+s/2-1, y+s/2+6); ctx.lineTo(x+s/2+6, y+s/2-2); ctx.stroke();
    ctx.lineWidth = 2;
  } else if (type === 'clock') {
    ctx.beginPath(); ctx.arc(x+s/2, y+s/2, s/2-2, 0, Math.PI*2); ctx.stroke();
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(x+s/2, y+6); ctx.lineTo(x+s/2, y+s/2); ctx.lineTo(x+s/2+6, y+s/2+4); ctx.stroke();
    ctx.fillStyle = '#34d399';
    ctx.beginPath(); ctx.arc(x+s/2, y+s/2, 2, 0, Math.PI*2); ctx.fill();
    ctx.lineWidth = 2;
  } else if (type === 'info') {
    ctx.beginPath(); ctx.arc(x+s/2, y+s/2, s/2-1, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = '#34d399';
    ctx.beginPath(); ctx.arc(x+s/2, y+7, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.lineWidth = 2.2;
    ctx.beginPath(); ctx.moveTo(x+s/2, y+12); ctx.lineTo(x+s/2, y+s-5); ctx.stroke();
    ctx.lineWidth = 2;
  } else if (type === 'phone') {
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x+8, y+1); ctx.lineTo(x+3, y+1);
    ctx.quadraticCurveTo(x+1, y+1, x+1, y+3);
    ctx.quadraticCurveTo(x+1, y+12, x+7, y+s-7);
    ctx.quadraticCurveTo(x+s-8, y+s-1, x+s-3, y+s-1);
    ctx.quadraticCurveTo(x+s-1, y+s-1, x+s-1, y+s-3);
    ctx.lineTo(x+s-1, y+s-6);
    ctx.stroke();
  } else if (type === 'globe') {
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(x+s/2, y+s/2, s/2-1, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(x+s/2, y+s/2, s/4, s/2-1, 0, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+1, y+s/2); ctx.lineTo(x+s-1, y+s/2); ctx.stroke();
  } else if (type === 'pin') {
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x+s/2, y+s-1);
    ctx.quadraticCurveTo(x+1, y+s/2-2, x+1, y+s/3);
    ctx.arc(x+s/2, y+s/3, s/2-1, Math.PI, 0, false);
    ctx.quadraticCurveTo(x+s-1, y+s/2-2, x+s/2, y+s-1);
    ctx.stroke();
    ctx.beginPath(); ctx.arc(x+s/2, y+s/3, 3, 0, Math.PI*2); ctx.stroke();
  }
}

function render() {
  const egitimTuru = document.getElementById('egitimTuru').value;
  const sertifikaTuru = document.getElementById('sertifikaTuru').value;
  const sonBasvuru = document.getElementById('sonBasvuru').value;
  const kursBaslangic = document.getElementById('kursBaslangic').value;
  const sinavTarihi = document.getElementById('sinavTarihi').value;
  const egitimSuresi = document.getElementById('egitimSuresi').value;

  // Background
  ctx.fillStyle = '#0f1f14';
  ctx.fillRect(0, 0, W, H);

  // Background glow
  let g1 = ctx.createRadialGradient(100, 50, 0, 100, 50, 500);
  g1.addColorStop(0, 'rgba(52,211,153,0.13)');
  g1.addColorStop(1, 'transparent');
  ctx.fillStyle = g1;
  ctx.fillRect(0, 0, W, H);

  let g2 = ctx.createRadialGradient(950, 1000, 0, 950, 1000, 400);
  g2.addColorStop(0, 'rgba(16,185,129,0.08)');
  g2.addColorStop(1, 'transparent');
  ctx.fillStyle = g2;
  ctx.fillRect(0, 0, W, H);

  // Grid pattern
  ctx.strokeStyle = 'rgba(52,211,153,0.025)';
  ctx.lineWidth = 1;
  for (let i = 0; i < W; i += 40) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke();
  }
  for (let i = 0; i < H; i += 40) {
    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke();
  }

  // Top accent
  let topGrad = ctx.createLinearGradient(0, 0, W, 0);
  topGrad.addColorStop(0, '#34d399');
  topGrad.addColorStop(0.5, '#059669');
  topGrad.addColorStop(1, '#34d399');
  ctx.fillStyle = topGrad;
  ctx.fillRect(0, 0, W, 5);

  // Bottom accent
  ctx.fillStyle = topGrad;
  ctx.fillRect(0, H-4, W, 4);

  // ---- HEADER ----
  // Logo box
  ctx.fillStyle = '#fff';
  roundRect(ctx, 52, 32, 54, 54, 14);
  ctx.fill();
  
  if (logoImg.complete && logoImg.naturalWidth > 0) {
    ctx.save();
    roundRect(ctx, 55, 35, 48, 48, 12);
    ctx.clip();
    ctx.drawImage(logoImg, 55, 35, 48, 48);
    ctx.restore();
  }

  // Brand text
  ctx.fillStyle = '#fff';
  ctx.font = '800 19px Montserrat';
  ctx.textBaseline = 'middle';
  ctx.fillText('YEŞİL ÖZEL GÜVENLİK', 120, 50);
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.font = '500 11.5px Montserrat';
  ctx.fillText('Eğitim ve Koruma Hizmetleri', 120, 72);

  // Kontenjan badge
  let badgeText = 'KONTENJAN SINIRLI';
  ctx.font = '800 10.5px Montserrat';
  let badgeW = ctx.measureText(badgeText).width + 32;
  let badgeX = W - 52 - badgeW;
  let badgeGrad = ctx.createLinearGradient(badgeX, 0, badgeX + badgeW, 0);
  badgeGrad.addColorStop(0, '#f59e0b');
  badgeGrad.addColorStop(1, '#d97706');
  ctx.fillStyle = badgeGrad;
  roundRect(ctx, badgeX, 42, badgeW, 30, 15);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '800 10.5px Montserrat';
  ctx.fillText(badgeText, badgeX + 16, 58);

  // ---- TITLE ----
  ctx.fillStyle = '#34d399';
  ctx.font = '700 13px Montserrat';
  ctx.fillText('ÖZEL GÜVENLİK', 52, 142);

  ctx.font = '900 56px Montserrat';
  ctx.fillStyle = '#34d399';
  let titleWord = egitimTuru === 'TEMEL' ? 'TEMEL' : 'YENİLEME';
  ctx.fillText(titleWord, 52, 205);
  ctx.fillStyle = '#fff';
  ctx.fillText('EĞİTİMİ', 52, 265);

  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '500 16px Montserrat';
  ctx.fillText('Profesyonel Güvenlik Eğitimi', 52, 298);

  // Divider 1
  let divGrad = ctx.createLinearGradient(52, 0, W-52, 0);
  divGrad.addColorStop(0, 'rgba(52,211,153,0.4)');
  divGrad.addColorStop(1, 'rgba(52,211,153,0.05)');
  ctx.fillStyle = divGrad;
  ctx.fillRect(52, 328, W-104, 1);

  // ---- DATE CARDS ----
  const cardW = (W - 104 - 36) / 3;
  const cardY = 356;
  const cardH = 160;
  const dates = [
    { label: 'SON BAŞVURU', value: sonBasvuru, icon: 'calendar' },
    { label: 'KURS BAŞLANGIÇ', value: kursBaslangic, icon: 'graduation' },
    { label: 'SINAV TARİHİ', value: sinavTarihi, icon: 'exam' }
  ];

  dates.forEach((d, i) => {
    const cx = 52 + i * (cardW + 18);
    
    // Card bg
    ctx.fillStyle = 'rgba(52,211,153,0.06)';
    roundRect(ctx, cx, cardY, cardW, cardH, 16);
    ctx.fill();
    ctx.strokeStyle = 'rgba(52,211,153,0.15)';
    ctx.lineWidth = 1;
    roundRect(ctx, cx, cardY, cardW, cardH, 16);
    ctx.stroke();

    // Top accent
    ctx.fillStyle = '#34d399';
    ctx.fillRect(cx+1, cardY, cardW-2, 3);

    // Icon
    drawIcon(d.icon, cx + 20, cardY + 22, 28);

    // Label
    ctx.fillStyle = '#34d399';
    ctx.font = '700 10px Montserrat';
    ctx.fillText(d.label, cx + 20, cardY + 72);

    // Value - handle line break for long dates
    ctx.fillStyle = '#fff';
    ctx.font = '800 21px Montserrat';
    let parts = d.value.split(' ');
    if (parts.length >= 3) {
      ctx.fillText(parts[0] + ' ' + parts[1], cx + 20, cardY + 105);
      ctx.fillText(parts.slice(2).join(' '), cx + 20, cardY + 132);
    } else {
      ctx.fillText(d.value, cx + 20, cardY + 115);
    }
  });

  // ---- INFO CARDS ----
  const infoY = 548;
  const infoH = 82;
  const halfW = (W - 104 - 18) / 2;

  // Sertifika card
  ctx.fillStyle = 'rgba(52,211,153,0.05)';
  roundRect(ctx, 52, infoY, halfW, infoH, 16);
  ctx.fill();
  ctx.strokeStyle = 'rgba(52,211,153,0.12)';
  ctx.lineWidth = 1;
  roundRect(ctx, 52, infoY, halfW, infoH, 16);
  ctx.stroke();

  drawIcon('shield', 72, infoY + 20, 36);
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '700 10px Montserrat';
  ctx.fillText('SERTİFİKA TÜRÜ', 120, infoY + 32);
  ctx.fillStyle = '#fff';
  ctx.font = '700 18px Montserrat';
  ctx.fillText(sertifikaTuru, 120, infoY + 58);

  // Süre card
  const sureX = 52 + halfW + 18;
  ctx.fillStyle = 'rgba(52,211,153,0.05)';
  roundRect(ctx, sureX, infoY, halfW, infoH, 16);
  ctx.fill();
  ctx.strokeStyle = 'rgba(52,211,153,0.12)';
  roundRect(ctx, sureX, infoY, halfW, infoH, 16);
  ctx.stroke();

  drawIcon('clock', sureX + 20, infoY + 20, 36);
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '700 10px Montserrat';
  ctx.fillText('EĞİTİM SÜRESİ', sureX + 68, infoY + 32);
  ctx.fillStyle = '#fff';
  ctx.font = '700 16px Montserrat';
  ctx.fillText(egitimSuresi, sureX + 68, infoY + 58);

  // ---- NOTICE ----
  const notY = 670;
  const notH = 70;
  ctx.fillStyle = 'rgba(52,211,153,0.05)';
  roundRect(ctx, 52, notY, W - 104, notH, 14);
  ctx.fill();
  ctx.strokeStyle = 'rgba(52,211,153,0.12)';
  ctx.lineWidth = 1;
  roundRect(ctx, 52, notY, W - 104, notH, 14);
  ctx.stroke();

  drawIcon('info', 72, notY + 20, 22);

  ctx.font = '500 14px Montserrat';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillText('Detaylı bilgi için hafta içi', 108, notY + 28);
  ctx.fillStyle = '#34d399';
  ctx.font = '700 14px Montserrat';
  let tw1 = ctx.measureText('Detaylı bilgi için hafta içi ').width;
  ctx.fillText('09.00 – 18.00', 108 + tw1, notY + 28);
  
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '500 14px Montserrat';
  ctx.fillText('Cumartesi', 108, notY + 52);
  ctx.fillStyle = '#34d399';
  ctx.font = '700 14px Montserrat';
  let tw2 = ctx.measureText('Cumartesi ').width;
  ctx.fillText('09.00 – 16.00', 108 + tw2, notY + 52);
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '500 14px Montserrat';
  let tw3 = ctx.measureText('09.00 – 16.00 ').width;
  ctx.fillText('saatleri arasında bize ulaşabilirsiniz.', 108 + tw2 + tw3, notY + 52);

  // Divider 2
  ctx.fillStyle = 'rgba(52,211,153,0.12)';
  ctx.fillRect(52, H - 150, W - 104, 1);

  // ---- FOOTER ----
  const footY = H - 56;
  
  // Phone
  drawIcon('phone', 52, footY - 8, 18);
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.font = '600 13px Montserrat';
  ctx.fillText('0262 325 36 66', 78, footY + 2);

  // Globe
  let mid = W / 2 - 60;
  drawIcon('globe', mid, footY - 8, 18);
  ctx.fillText('yesilozelguvenlik.com', mid + 26, footY + 2);

  // Pin
  let pinX = W - 300;
  drawIcon('pin', pinX, footY - 8, 18);
  ctx.font = '600 11px Montserrat';
  ctx.fillText('Ömerağa Mh. Naci Girginsoy Cd.', pinX + 26, footY - 3);
  ctx.fillText('No:7/4 İzmit/Kocaeli', pinX + 26, footY + 12);
}

function download() {
  render();
  const link = document.createElement('a');
  link.download = 'yesil-guvenlik-egitim-ilani.png';
  link.href = canvas.toDataURL('image/png');
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

// Initial render
window.addEventListener('load', () => {
  document.fonts.ready.then(() => {
    setTimeout(render, 200);
  });
});
</script>

</body>
</html>
